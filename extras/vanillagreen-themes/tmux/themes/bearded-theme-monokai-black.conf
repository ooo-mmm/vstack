# Bearded Theme Monokai Black -- vanillagreen tmux theme (colors only).
# COLORS-ONLY: vstack never touches status-left / status-right /
# window-status-format / window-status-separator so user-defined status
# bar modules (git, prefix indicators, etc.) stay intact. If your prior
# theme switcher baked hex colors INSIDE format strings, vstack's color
# overrides won't reach those characters -- regenerate your format
# strings or remove the competing switcher.

# Clear stale window-style override from a previous theme; vstack itself
# doesn't dim inactive panes (on dark themes color8 sits too close to bg).
set -gu window-style

set -g status-style "bg=#141414,fg=#444444"
set -g message-style "bg=#ffd866,fg=#141414"
set -g message-command-style "bg=#ffd866,fg=#141414"
set -g pane-border-style "fg=#444444"
set -g pane-active-border-style "fg=#ffd866"
set -g window-active-style "fg=#c7c7c7"
set -g mode-style "bg=#444444"
set -g copy-mode-selection-style "bg=#444444"
set -g clock-mode-colour "#fc6a67"
set -g window-status-style "fg=#444444"
set -g window-status-current-style "bg=#ffd866,fg=#141414,bold"
set -g window-status-activity-style "fg=default,bold"
set -g window-status-bell-style "fg=default,bold"
